{% extends 'base.html' %}
{% load static %}

{% block title %}Send Notification{% endblock %}

{% block content %}

<div class="list-header">
    <div class="list-title">
        <h1><i class="fas fa-paper-plane"></i> Send Notification</h1>
        <p>Send announcements to students, teachers, or parents</p>
    </div>
</div>

<div class="card">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Title <span class="required">*</span></label>
            <input type="text" name="title" placeholder="e.g., Exam Schedule Update" class="form-control" required>
        </div>
        <select name="notification_type" id="notificationType" class="form-control" required onchange="toggleClassSelect()">
    <option value="">-- Select Recipients --</option>
    
    {% if user_role == 'SUPER_ADMIN' %}
        <option value="ALL">📢 Everyone (All Users - All Schools)</option>
        <option value="TEACHER">👨‍🏫 All Teachers (All Schools)</option>
        <option value="PARENT">👪 All Parents (All Schools)</option>
        <option value="CLASS">🏫 Specific Class</option>
    
    {% elif user_role == 'ADMIN' %}
        <option value="ALL">📢 Everyone (Your School Only)</option>
        <option value="TEACHER">👨‍🏫 All Teachers (Your School)</option>
        <option value="PARENT">👪 All Parents (Your School)</option>
        <option value="STUDENT">👩‍🎓 All Students (Your School)</option>
        <option value="CLASS">🏫 Specific Class</option>
    
    {% elif user_role == 'TEACHER' %}
        <option value="CLASS">🏫 My Class</option>
    {% endif %}
</select>
        
        <div class="form-group" id="classSelect" style="display: none;">
            <label>Select Class</label>
            <select name="target_class" class="form-control">
                <option value="">-- Select Class --</option>
                {% for class in my_classes %}
                <option value="{{ class.id }}">{{ class.name }} {% if class.stream %}({{ class.stream }}){% endif %}</option>
                {% endfor %}
            </select>
            <small class="text-muted">Only students in this class will receive the notification</small>
        </div>
        
        <div class="form-group">
            <label>Message <span class="required">*</span></label>
            <textarea name="message" rows="6" placeholder="Type your message here..." class="form-control" required></textarea>
        </div>
        
        <div class="form-actions" style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn-primary">
                <i class="fas fa-paper-plane"></i> Send Notification
            </button>
            <a href="{% url 'user_notifications' %}" class="btn-view">
                <i class="fas fa-list"></i> View Notifications
            </a>
        </div>
    </form>
</div>

<script>
    function toggleClassSelect() {
        var type = document.getElementById('notificationType').value;
        var classSelect = document.getElementById('classSelect');
        classSelect.style.display = type === 'CLASS' ? 'block' : 'none';
    }
</script>

<style>
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}
.form-control {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
}
.btn-primary {
    background: #c084fc;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
}
.btn-view {
    background: #e5e7eb;
    color: #374151;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
}
</style>

{% endblock %}
